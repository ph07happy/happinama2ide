services:
  - type: web
    name: happinama-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: JUDGE0_URL
        value: https://ce.judge0.com
      - key: JUDGE0_AUTH_TOKEN
        value: ""          # leave blank; set only when self-hosting with auth
